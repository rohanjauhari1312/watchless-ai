<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WatchlessAI</title>
<style>
  :root {
    --bg: #0e0f12;
    --panel: #17181c;
    --border: #2a2c31;
    --text: #e8e9ec;
    --muted: #9a9da4;
    --accent: #5b8cff;
    --danger: #e5544d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #app { max-width: 980px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  h2 { font-size: 16px; font-weight: 600; margin: 0 0 12px; }
  a { color: var(--accent); }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  input, textarea {
    background: #0e0f12;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 9px 11px;
    font-size: 14px;
    width: 100%;
  }
  button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 9px 14px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  button.secondary { background: #2a2c31; }
  button.danger { background: var(--danger); }
  button:disabled { opacity: 0.5; cursor: default; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .muted { color: var(--muted); font-size: 13px; }
  .card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .pill {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    background: #2a2c31;
  }
  .pill.live { background: #1f3a26; color: #6fd88a; }
  .frame-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .frame-item button { flex-shrink: 0; }
  .frame-item img { width: 90px; height: 60px; object-fit: cover; border-radius: 4px; background: #000; }
  .chat-log { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; max-height: 320px; overflow-y: auto; }
  .chat-msg { padding: 10px 12px; border-radius: 8px; font-size: 14px; max-width: 85%; line-height: 1.5; }
  .chat-msg.user { background: var(--accent); align-self: flex-end; }
  .chat-msg.assistant { background: #232529; align-self: flex-start; }
  .chat-msg p { margin: 0 0 8px; }
  .chat-msg p:last-child { margin-bottom: 0; }
  .chat-msg ul { margin: 4px 0 8px; padding-left: 18px; }
  .chat-msg ul:last-child { margin-bottom: 0; }
  .chat-msg li { margin-bottom: 4px; }
  .chat-msg .chat-heading { font-weight: 600; margin: 4px 0 6px; }
  .chat-msg .chat-heading:first-child { margin-top: 0; }
  .chat-msg strong { font-weight: 600; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .back { cursor: pointer; color: var(--muted); font-size: 13px; margin-bottom: 16px; display: inline-block; }
  .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .tabs button { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }
  .hidden { display: none !important; }
  .error { color: var(--danger); font-size: 13px; margin-top: 6px; }
  .ts-link {
    background: none;
    border: none;
    color: #5DCAA5;
    cursor: pointer;
    font-family: monospace;
    font-size: 0.85em;
    padding: 1px 3px;
    text-decoration: underline;
    text-underline-offset: 2px;
    border-radius: 3px;
  }
  .ts-link:hover { color: #9FE1CB; background: rgba(93,202,165,0.08); }
  .frame-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .frame-modal.hidden { display: none !important; }
  .frame-modal-inner {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    max-width: 620px;
    width: 92%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .frame-modal-inner img { width: 100%; border-radius: 6px; margin-bottom: 12px; display: block; }
</style>
</head>
<body>
<div id="app"></div>
<script src="/app.js"></script>
</body>
</html>
